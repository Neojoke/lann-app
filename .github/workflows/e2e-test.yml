# Lann App E2E Tests - 本地测试方案
# 使用 GitHub Actions + Android 模拟器 + Maestro CLI (免费方案)

name: Lann App E2E Tests (Local)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# 取消正在运行的旧任务，避免重复测试
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 安装 Java 17 (Maestro 要求)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # 3. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json
      
      # 4. 安装 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: 'platform-tools,platforms;android-33,build-tools;33.0.1,system-images;android-33;google_apis;x86_64'
      
      # 5. 安装 Maestro CLI
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> $GITHUB_PATH
          maestro --version
      
      # 6. 安装项目依赖
      - name: Install dependencies
        working-directory: mobile-app
        run: npm ci
      
      # 7. 构建 Web 应用
      - name: Build web app
        working-directory: mobile-app
        run: npm run build
      
      # 8. 同步 Capacitor
      - name: Sync Capacitor
        working-directory: mobile-app
        run: npx cap sync android
      
      # 9. 创建 Android 模拟器并运行测试
      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          ram-size: 4096M
          heap-size: 1024M
          sdcard-path-or-size: 512M
          script: |
            echo "=== 开始构建 Android APK ==="
            cd mobile-app/android
            ./gradlew assembleDebug --no-daemon
            
            echo "=== 安装 APK 到模拟器 ==="
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            
            echo "=== 等待模拟器就绪 ==="
            adb wait-for-device
            sleep 10
            
            echo "=== 解锁屏幕 ==="
            adb shell input keyevent 82
            
            echo "=== 运行 Maestro E2E 测试 ==="
            cd ../..
            maestro test .maestro/flows/ --reporter junit
            
            echo "=== 测试完成 ==="
      
      # 10. 上传测试报告
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            report.xml
            *.log
          retention-days: 30
      
      # 11. 上传 APK (如果构建成功)
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lann-app-debug
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
