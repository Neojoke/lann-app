name: Test Suite - Lann Thailand Loan App

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run unit tests
      run: npm run test:unit
      env:
        CI: true
        
    - name: Upload unit test coverage
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage/unit-test-results.xml
        flags: unit

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run database migrations
      run: npm run db:migrate
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379
        
    - name: Run integration tests
      run: npm run test:integration
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-secret
        TEST_MODE: true
        
    - name: Upload integration test coverage
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage/integration-test-results.xml
        flags: integration

  e2e-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Build application
      run: npm run build
      
    - name: Start application in background
      run: |
        npm run start:test &
        sleep 10  # Wait for app to start
        
    - name: Run E2E tests
      run: npm run test:e2e
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/e2e_test_db
        BASE_URL: http://localhost:3000
        TEST_USER_EMAIL: test@example.com
        TEST_USER_PASSWORD: SecurePassword1!
        
    - name: Upload E2E test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: test-results/
        
    - name: Upload E2E test coverage
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage/e2e-test-results.xml
        flags: e2e

  performance-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup k6
      run: |
        sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E36E23E5EC01D3A65E89F7ECCBC857
        echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6
        
    - name: Run performance tests
      run: |
        # Start the app in background for performance testing
        npm run start:perf-test &
        sleep 15  # Wait for app to start
        k6 run test/performance/api-performance.test.js --out json=perf-results.json
        k6 run test/performance/mixed-scenario.test.js --out json=mixed-perf-results.json
        
    - name: Upload performance test results
      uses: actions/upload-artifact@v4
      with:
        name: performance-test-results
        path: perf-results.json,mixed-perf-results.json

  security-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run npm audit
      run: npm audit --audit-level high
      
    - name: Run dependency security scan
      run: npm run security:scan
      
    - name: Run OWASP ZAP scan (if available)
      run: |
        if command -v zap-cli &> /dev/null; then
          echo "Running ZAP security scan..."
          # Configure and run ZAP scan
          # This is a placeholder - actual ZAP setup would depend on your configuration
        else
          echo "ZAP not available, skipping security scan"
        fi
      continue-on-error: true

  coverage-check:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Download all coverage reports
      uses: actions/download-artifact@v4
      with:
        path: coverage-reports
        
    - name: Combine coverage reports
      run: npm run test:coverage:combine
      
    - name: Check coverage thresholds
      run: |
        # Verify that overall coverage meets the 90% threshold
        npx nyc check-coverage --lines 90 --functions 90 --branches 90
        
    - name: Upload combined coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/combined-coverage.xml
        flags: combined
        name: codecov-umbrella
        fail_ci_if_error: true

  notify-success:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, performance-tests, security-tests, coverage-check]
    if: ${{ always() && contains(needs.*.result, 'success') && !contains(needs.*.result, 'failure') }}
    steps:
    - name: Notify success
      run: echo "All tests passed successfully!"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, performance-tests, security-tests, coverage-check]
    if: ${{ contains(needs.*.result, 'failure') }}
    steps:
    - name: Notify failure
      run: |
        echo "Some tests failed!"
        exit 1