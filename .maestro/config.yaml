## 📱 Android 模拟器配置

### 创建测试专用模拟器

```bash
# 创建 Pixel 6 API 33 模拟器
avdmanager create avd -n lann-test -k "system-images;android-33;google_apis;x86_64"

# 启动模拟器
emulator -avd lann-test -no-snapshot -no-boot-anim
```

### 安装 App

```bash
# 构建 Debug 版本
cd mobile-app
ionic capacitor build android

# 安装到模拟器
adb install -r android/app/build/outputs/apk/debug/app-debug.apk
```

---

## 📈 测试报告

### 生成 HTML 报告

```bash
# 运行测试并生成报告
maestro test .maestro/flows/ --reporter html

# 查看报告
open reports/maestro-results.html
```

### 集成到 CI

```yaml
- name: Upload Test Results
  uses: actions/upload-artifact@v3
  with:
    name: maestro-results
    path: reports/
```

