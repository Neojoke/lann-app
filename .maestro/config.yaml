## 🎯 最佳实践

1. **测试命名规范**
   - 使用描述性名称：`login-success.yaml`, `borrow-amount-validation.yaml`
   - 添加标签便于筛选

2. **数据隔离**
   - 使用测试专用账号
   - 每次测试后清理数据

3. **等待策略**
   - 使用 `assertVisible` 代替固定等待
   - 设置合理超时时间

4. **错误处理**
   - 添加重试机制
   - 记录详细错误信息

5. **持续维护**
   - 随功能更新同步更新测试
   - 定期审查和优化测试用例

