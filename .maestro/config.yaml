## 📝 Maestro Flow 示例

### 登录测试 (`login.yaml`)

```yaml
appId: com.lann.app
name: 用户登录测试
tags:
  - login
  - auth

---
- launchApp
- assertVisible: "สวัสดี" # 泰语"欢迎"
- assertVisible: "Hello"   # 英语"欢迎"

- tapOn:
    text: "Login"
- assertVisible: "Phone Number"

- inputText: "+66812345678"
- tapOn:
    text: "Next"

- inputText: "123456" # OTP
- tapOn:
    text: "Verify"

- assertVisible: "Available Credit"
- assertVisible: "Borrow Now"
```

### 注册测试 (`register.yaml`)

```yaml
appId: com.lann.app
name: 用户注册测试
tags:
  - register
  - auth

---
- launchApp
- tapOn:
    text: "Register"

- assertVisible: "Phone Number"
- inputText: "+66898765432"

- tapOn:
    text: "Send OTP"
- assertVisible: "Enter OTP"

- inputText: "123456"
- tapOn:
    text: "Verify OTP"

- inputText: "TestUser"
- inputText: "password123"
- inputText: "password123" # 确认密码

- tapOn:
    text: "Register"

- assertVisible: "Registration Successful"
- assertVisible: "Available Credit"
```

### 借款申请测试 (`borrow.yaml`)

```yaml
appId: com.lann.app
name: 借款申请测试
tags:
  - borrow
  - loan

---
- launchApp

# 跳过登录（假设已登录）
- tapOn:
    text: "Borrow Now"

- assertVisible: "Amount"
- assertVisible: "Days"

# 选择借款金额
- swipe:
    start: 20%
    end: 80%
    direction: RIGHT

- assertVisible: "฿ 10,000" # 验证金额

# 选择借款期限
- tapOn:
    text: "14 Days"

# 验证利息计算
- assertVisible: "Interest"
- assertVisible: "Total Repayment"

# 确认借款
- tapOn:
    text: "Confirm Borrow"

- assertVisible: "Loan Approved"
- assertVisible: "Success"
```

### 语言切换测试 (`language-switch.yaml`)

```yaml
appId: com.lann.app
name: 语言切换测试
tags:
  - i18n
  - settings

---
- launchApp

# 验证初始语言 (英语)
- assertVisible: "Hello"
- assertVisible: "Borrow Now"

# 进入设置
- tapOn:
    text: "Settings"
- tapOn:
    text: "Language"

# 切换到泰语
- tapOn:
    text: "ไทย"

# 验证泰语显示
- assertVisible: "สวัสดี"
- assertVisible: "กู้เงินทันที"

# 切换回英语
- tapOn:
    text: "การตั้งค่า" # 设置的泰语
- tapOn:
    text: "ภาษา" # 语言的泰语
- tapOn:
    text: "English"

# 验证英语显示
- assertVisible: "Hello"
- assertVisible: "Borrow Now"
```

