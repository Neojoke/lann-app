## 🚀 运行测试

### 本地运行

```bash
# 运行所有测试
maestro test .maestro/flows/

# 运行单个测试
maestro test .maestro/flows/login.yaml

# 运行带标签的测试
maestro test .maestro/flows/ --tags login
```

### CI/CD 集成

```yaml
# GitHub Actions (.github/workflows/e2e-test.yml)
name: E2E Tests

on: [push, pull_request]

jobs:
  maestro-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Maestro
        uses: mobile-dev-inc/action-maestro-cloud@v1.0.0
      
      - name: Run E2E Tests
        run: |
          maestro test .maestro/flows/
```

