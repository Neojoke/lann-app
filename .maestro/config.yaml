## 🔧 Maestro 配置选项

### `.maestro/config.yaml`

```yaml
flows:
  - "flows/**/*.yaml"

exclude:
  - "flows/**/draft-*.yaml"

tags:
  include:
    - login
    - register
    - borrow
    - repay
    - i18n

report:
  format: junit
  output: reports/maestro-results.xml

timeout: 30000 # 30 秒超时
retryCount: 2  # 失败重试 2 次
```

