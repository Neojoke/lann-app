# Maestro E2E 测试配置

**测试框架:** Maestro  
**适用平台:** Android (优先) + iOS  
**创建日期:** 2026-03-15

---

## 📦 安装配置

### 1. 安装 Maestro

```bash
# macOS
curl -Ls "https://get.maestro.mobile.dev" | bash

# Linux
wget -q "https://get.maestro.mobile.dev" -O - | bash

# 验证安装
maestro --version
```

### 2. 项目配置

在项目根目录创建 `.maestro/` 文件夹：

```
lann-thailand-loan-app/
├── .maestro/
│   ├── config.yaml
│   ├── flows/
│   │   ├── login.yaml
│   │   ├── register.yaml
│   │   ├── borrow.yaml
│   │   └── repay.yaml
│   └── tests/
│       └── ...
```

---

## 🎯 测试用例规划

### 核心流程测试

#### 1. 用户注册流程 (`register.yaml`)
- [ ] 打开 App
- [ ] 点击注册按钮
- [ ] 输入手机号 (+66)
- [ ] 获取 OTP
- [ ] 输入 OTP 验证码
- [ ] 设置登录密码
- [ ] 注册成功，跳转到首页

#### 2. 用户登录流程 (`login.yaml`)
- [ ] 打开 App
- [ ] 输入手机号
- [ ] 输入密码
- [ ] 登录成功
- [ ] 显示首页和个人信息

#### 3. 借款申请流程 (`borrow.yaml`)
- [ ] 从首页点击"借款"
- [ ] 选择借款金额 (滑动条)
- [ ] 选择借款期限 (7/14/21/30 天)
- [ ] 查看利息和还款金额
- [ ] 确认借款
- [ ] 提交成功

#### 4. 还款流程 (`repay.yaml`)
- [ ] 从首页点击"还款"
- [ ] 查看应还金额
- [ ] 选择还款方式
- [ ] 确认还款
- [ ] 还款成功

#### 5. 语言切换流程 (`language-switch.yaml`)
- [ ] 打开设置
- [ ] 点击语言选择
- [ ] 切换到泰语
- [ ] 验证界面文字变为泰语
- [ ] 切换到英语
- [ ] 验证界面文字变为英语

