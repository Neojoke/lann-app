# Lann App - 语言切换 E2E 测试
# 测试泰语和英语切换功能

appId: com.lann.thailand

---
- launchApp
- tapOn: "Login"

# 登录
- inputText: "0812345678"
- tapOn: "Next"
- inputText: "TestPassword123!"
- tapOn: "Login"

# 验证当前语言 (英语)
- assertVisible: "Credit Status"
- assertVisible: "Available Limit"

# 切换到泰语
- tapOn: "Language"
- tapOn: "ไทย"

# 验证泰语界面
- assertVisible: "สถานะเครดิต"
- assertVisible: "วงเงินคงเหลือ"

# 切换回英语
- tapOn: "Language"
- tapOn: "English"

# 验证英语界面
- assertVisible: "Credit Status"
- assertVisible: "Available Limit"

# 验证语言持久化
- killApp
- launchApp
- tapOn: "Login"
- assertVisible: "Credit Status"
