# Lann App - 借款申请流程 E2E 测试
# 测试借款申请完整流程

appId: com.lann.thailand
env:
  LOAN_AMOUNT: "10000"
  LOAN_TERM: "14"

---
- launchApp
- tapOn: "Login"

# 登录
- inputText: "0812345678"
- tapOn: "Next"
- inputText: "TestPassword123!"
- tapOn: "Login"

# 进入借款页面
- tapOn: "Borrow"
- assertVisible: "Loan Products"

# 选择产品
- tapOn: "Payday Loan"
- assertVisible: "Loan Amount"

# 输入金额
- inputText: "${LOAN_AMOUNT}"

# 选择期限
- tapOn: "${LOAN_TERM} days"

# 查看还款计划
- assertVisible: "Total Repayment"
- assertVisible: "Interest"
- assertVisible: "Daily Payment"

# 确认借款
- tapOn: "Apply Now"

# 验证申请提交
- assertVisible: "Application Submitted"
- assertVisible: "Application ID"

# 等待审批
- assertVisible: "Pending Approval"
